<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>箱庭 描画方式 比較プロトタイプ</title>
<style>
  :root {
    --bg: #0c0e14;
    --panel: #13161f;
    --ink: #e8eaf0;
    --muted: #7c8298;
    --line: #242838;
    --accent: #b6ff3f;       /* acid lime */
    --accent2: #ff2fa0;      /* hot magenta */
    --radius: 14px;
    --font: "Inter", system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 64px; }
  header { margin-bottom: 22px; }
  h1 {
    font-size: 19px; font-weight: 650; letter-spacing: .01em;
    margin: 0 0 6px;
  }
  .sub { color: var(--muted); font-size: 13px; line-height: 1.6; margin: 0; }
  .sub b { color: var(--ink); font-weight: 600; }

  .tabs {
    display: flex; gap: 6px; margin: 22px 0 16px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    appearance: none; border: 0; background: transparent;
    color: var(--muted); font-family: var(--font);
    font-size: 13.5px; font-weight: 550; letter-spacing: .01em;
    padding: 11px 16px; cursor: pointer; position: relative;
    border-radius: 8px 8px 0 0; transition: color .15s;
  }
  .tab:hover { color: var(--ink); }
  .tab[aria-selected="true"] { color: var(--ink); }
  .tab[aria-selected="true"]::after {
    content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px;
    height: 2px; background: var(--accent); border-radius: 2px;
  }
  .tab .idx {
    font-variant-numeric: tabular-nums; color: var(--muted);
    margin-right: 7px; font-size: 11.5px; opacity: .8;
  }
  .tab[aria-selected="true"] .idx { color: var(--accent); opacity: 1; }

  .stage-shell {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    display: none;
  }
  .stage.active { display: block; }
  .stage canvas, .stage svg { display: block; width: 100%; height: 100%; }

  .caption {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border-top: 1px solid var(--line);
    background: linear-gradient(180deg, transparent, rgba(255,255,255,.012));
  }
  .caption .dot {
    width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex: none;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
  }
  .caption .body { font-size: 12.5px; color: var(--muted); line-height: 1.65; }
  .caption .body b { color: var(--ink); font-weight: 600; }
  .caption .tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px; color: var(--muted); border: 1px solid var(--line);
    padding: 2px 8px; border-radius: 20px; letter-spacing: .02em;
  }

  .controls {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 14px; color: var(--muted); font-size: 12.5px;
  }
  .controls .hint { display: flex; align-items: center; gap: 6px; }
  .controls kbd {
    font-family: var(--font); font-size: 11px; color: var(--ink);
    background: #1b1f2b; border: 1px solid var(--line);
    border-bottom-width: 2px; border-radius: 5px; padding: 1px 7px;
  }
  .legend { margin-top: 8px; color: var(--muted); font-size: 12px; }
  @media (max-width: 560px) {
    .tab { padding: 10px 10px; font-size: 12.5px; }
    .tab .idx { display: none; }
  }
  .fx-toggle {
    appearance: none; border: 1px solid var(--line);
    background: rgba(12,14,20,.72); backdrop-filter: blur(6px);
    color: var(--muted); font-family: var(--font); font-size: 11.5px;
    font-weight: 550; letter-spacing: .02em;
    padding: 6px 11px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: all .15s;
    min-width: 116px;
  }
  .fx-toggle:hover { color: var(--ink); border-color: #3a4258; }
  .fx-toggle .sw {
    width: 8px; height: 8px; border-radius: 50%; flex: none;
    background: #3a4258; transition: all .15s;
  }
  .fx-toggle[data-on="true"] { color: var(--ink); }
  .fx-toggle[data-on="true"] .sw { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>箱庭 — 描画方式くらべ</h1>
    <p class="sub">同じ被写体を3つの描画方式で。<b>家が数軒・木が数本・花が少し・高層ビル1本・舞う光の粒</b>。質感の違いだけ見て、心が動くやつを選んで。</p>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true"  data-stage="iso"><span class="idx">01</span>クォータービュー 2.5D</button>
    <button class="tab" role="tab" aria-selected="false" data-stage="flat"><span class="idx">02</span>切り絵フラット 2.5D</button>
    <button class="tab" role="tab" aria-selected="false" data-stage="three"><span class="idx">03</span>3D ボクセル</button>
  </div>

  <div class="stage-shell">
    <!-- 01 ISO -->
    <div class="stage active" data-stage="iso">
      <canvas id="isoCanvas"></canvas>
    </div>
    <!-- 02 FLAT -->
    <div class="stage" data-stage="flat">
      <div id="flatHost" style="width:100%;height:100%"></div>
    </div>
    <!-- 03 THREE -->
    <div class="stage" data-stage="three">
      <canvas id="threeCanvas"></canvas>
      <div id="threeToggles" style="position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:5"></div>
    </div>

    <div class="caption">
      <span class="dot"></span>
      <div class="body" id="capBody"></div>
    </div>
  </div>

  <div class="controls" id="controls"></div>
  <p class="legend" id="legend"></p>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>

<script>
/* ============================================================
   共通: 被写体レイアウト（全方式で同じ配置を使う）
   グリッド上の物体リスト。type と grid座標 (gx,gy) を持つ。
   ============================================================ */
const GRID = 8; // 8x8 の更地
const OBJECTS = [
  { type: "tower", gx: 5, gy: 2, h: 5.4 },   // 高層ビル1本
  { type: "house", gx: 2, gy: 2 },
  { type: "house", gx: 3, gy: 2 },
  { type: "house", gx: 2, gy: 3 },
  { type: "house", gx: 6, gy: 5 },
  { type: "house", gx: 1, gy: 5 },
  { type: "tree",  gx: 4, gy: 5 },
  { type: "tree",  gx: 5, gy: 6 },
  { type: "tree",  gx: 1, gy: 1 },
  { type: "flower",gx: 3, gy: 6 },
  { type: "flower",gx: 4, gy: 6 },
  { type: "flower",gx: 6, gy: 3 },
  { type: "flower",gx: 2, gy: 6 },
];
// 描画順（奥→手前）: gx+gy が小さいほど奥
const ORDER = [...OBJECTS].sort((a,b)=> (a.gx+a.gy)-(b.gx+b.gy));

const PALETTE = {
  ground1: "#1c2230", ground2: "#161b27",
  gridLine: "#2b3346",
  house: "#e9ecf5", houseRoof: "#ff5fae", houseRoof2:"#b6ff3f",
  tower: "#cfd6e8", towerGlass:"#6ad1ff", towerLit:"#ffe87a",
  tree: "#5fd17a", treeDark:"#2f9e57", trunk:"#8a5a3a",
  flower: ["#ff7ad1","#ffd24a","#7ad1ff","#b6ff3f"],
};

const CAPTIONS = {
  iso: `<b>Canvas 2D で描いたアイソメ箱庭。</b>菱形タイルを奥から手前へ重ねて、ドット風のソリッドな塗り。上に発光ブルームと舞う光の粒を乗せて HD-2D の空気感を狙ったやつ。`,
  flat:`<b>SVG レイヤーの切り絵フラット。</b>面でパキッと塗って軽い影だけ。ネオン×闇の配色で、りゅうのイラストと混ぜやすい・差し替えしやすいのが強み。あたしが一番見た目を保証できる方式。`,
  three:`<b>Three.js × HD-2D ボクセル箱庭。</b>三点ライティング（暖色キー＋寒色フィル＋ネオンのリム）でポイントライト影を落として、自前のポストシェーダーで tilt-shift ぼかし・ブルーム・ビネット・色グレを乗せたやつ。Octopath系の「ミニチュアを覗き込む」質感を依存ライブラリ追加なしで再現してる。右上トグルで効果オンオフ比較できるよ。`,
};
const TAGS = {
  iso: ["Canvas 2D","軽い","HD-2D寄り","アセット手打ち"],
  flat:["SVG","超軽い","差し替え楽","絵テイスト混和"],
  three:["WebGL/Three.js","ポイントライト影","tilt-shift/bloom","本命"],
};
const CONTROLS = {
  iso:  `<span class="hint">マウスで <kbd>ドラッグ</kbd> 視点パン</span><span class="hint"><kbd>ホイール</kbd> ズーム</span>`,
  flat: `<span class="hint">マウス移動で <kbd>パララックス</kbd></span>`,
  three:`<span class="hint"><kbd>ドラッグ</kbd> 回転</span><span class="hint"><kbd>ホイール</kbd> ズーム</span><span class="hint">右上 <kbd>トグル</kbd> で効果比較</span>`,
};

/* ============================================================
   タブ切り替え
   ============================================================ */
const tabs = [...document.querySelectorAll(".tab")];
const stages = [...document.querySelectorAll(".stage")];
const capBody = document.getElementById("capBody");
const controlsEl = document.getElementById("controls");
let current = "iso";
const started = { iso:false, flat:false, three:false };

function selectStage(name){
  current = name;
  tabs.forEach(t=> t.setAttribute("aria-selected", String(t.dataset.stage===name)));
  stages.forEach(s=> s.classList.toggle("active", s.dataset.stage===name));
  capBody.innerHTML = CAPTIONS[name] +
    `<div class="tags">${TAGS[name].map(t=>`<span class="tag">${t}</span>`).join("")}</div>`;
  controlsEl.innerHTML = CONTROLS[name];
  if(!started[name]){ started[name]=true; INIT[name](); }
  if(name==="three" && threeAPI) threeAPI.resume();
  else if(threeAPI) threeAPI.pause();
}
tabs.forEach(t=> t.addEventListener("click", ()=> selectStage(t.dataset.stage)));

/* ============================================================
   01: アイソメ 2.5D  (Canvas 2D)
   ============================================================ */
function initIso(){
  const canvas = document.getElementById("isoCanvas");
  const ctx = canvas.getContext("2d");
  let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  const cam = { x:0, y:0, zoom:1, tx:0, ty:0 }; // pan + zoom
  const TILE_W = 72, TILE_H = 36; // 菱形タイル
  const particles = Array.from({length:46}, ()=>spawnP());
  function spawnP(){ return { x:Math.random(), y:Math.random(), z:Math.random()*1+0.2, s:Math.random()*1.6+0.6, ph:Math.random()*6.28 }; }

  function resize(){
    const r = canvas.getBoundingClientRect();
    W=r.width; H=r.height;
    canvas.width=W*DPR; canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  new ResizeObserver(resize).observe(canvas);
  resize();

  // grid -> screen（アイソメ投影）
  function iso(gx,gy){
    const ox = W/2 + cam.tx;
    const oy = H*0.30 + cam.ty;
    const z = cam.zoom;
    return {
      x: ox + (gx-gy)*(TILE_W/2)*z,
      y: oy + (gx+gy)*(TILE_H/2)*z,
    };
  }

  function diamond(gx,gy,fill,stroke){
    const z=cam.zoom;
    const c = iso(gx,gy);
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x + TILE_W/2*z, c.y + TILE_H/2*z);
    ctx.lineTo(c.x, c.y + TILE_H*z);
    ctx.lineTo(c.x - TILE_W/2*z, c.y + TILE_H/2*z);
    ctx.closePath();
    if(fill){ ctx.fillStyle=fill; ctx.fill(); }
    if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke(); }
  }

  // 立体ブロック（家/ビル）を菱形ベースから上に立ち上げる
  function box(gx,gy,hgt,top,left,right){
    const z=cam.zoom;
    const base = iso(gx,gy);
    const hh = hgt*z;
    const halfW=TILE_W/2*z, halfH=TILE_H/2*z;
    const bC={x:base.x, y:base.y};                 // top diamond center
    // bottom corners
    const bTop   = {x:bC.x, y:bC.y};
    const bRight = {x:bC.x+halfW, y:bC.y+halfH};
    const bBot   = {x:bC.x, y:bC.y+halfH*2};
    const bLeft  = {x:bC.x-halfW, y:bC.y+halfH};
    // left face
    ctx.beginPath();
    ctx.moveTo(bLeft.x, bLeft.y-hh);
    ctx.lineTo(bBot.x,  bBot.y-hh);
    ctx.lineTo(bBot.x,  bBot.y);
    ctx.lineTo(bLeft.x, bLeft.y);
    ctx.closePath(); ctx.fillStyle=left; ctx.fill();
    // right face
    ctx.beginPath();
    ctx.moveTo(bRight.x, bRight.y-hh);
    ctx.lineTo(bBot.x,   bBot.y-hh);
    ctx.lineTo(bBot.x,   bBot.y);
    ctx.lineTo(bRight.x, bRight.y);
    ctx.closePath(); ctx.fillStyle=right; ctx.fill();
    // top
    ctx.beginPath();
    ctx.moveTo(bTop.x,   bTop.y-hh);
    ctx.lineTo(bRight.x, bRight.y-hh);
    ctx.lineTo(bBot.x,   bBot.y-hh);
    ctx.lineTo(bLeft.x,  bLeft.y-hh);
    ctx.closePath(); ctx.fillStyle=top; ctx.fill();
    return {top:bTop.y-hh};
  }

  function shade(hex, f){
    const c=parseInt(hex.slice(1),16); let r=(c>>16)&255,g=(c>>8)&255,b=c&255;
    r=Math.round(r*f); g=Math.round(g*f); b=Math.round(b*f);
    return `rgb(${r},${g},${b})`;
  }

  function drawObject(o,t){
    const z=cam.zoom;
    if(o.type==="house"){
      box(o.gx,o.gy, 26, PALETTE.house, shade(PALETTE.house,.62), shade(PALETTE.house,.8));
      // roof
      const base=iso(o.gx,o.gy); const hh=26*z; const halfW=TILE_W/2*z, halfH=TILE_H/2*z;
      const roofH=16*z;
      const top={x:base.x,y:base.y-hh}, rgt={x:base.x+halfW,y:base.y+halfH-hh},
            bot={x:base.x,y:base.y+halfH*2-hh}, lft={x:base.x-halfW,y:base.y+halfH-hh};
      const peak={x:base.x, y:base.y+halfH-hh-roofH};
      ctx.beginPath(); ctx.moveTo(lft.x,lft.y); ctx.lineTo(top.x,top.y); ctx.lineTo(peak.x,peak.y); ctx.closePath();
      ctx.fillStyle=PALETTE.houseRoof; ctx.fill();
      ctx.beginPath(); ctx.moveTo(top.x,top.y); ctx.lineTo(rgt.x,rgt.y); ctx.lineTo(peak.x,peak.y); ctx.closePath();
      ctx.fillStyle=shade(PALETTE.houseRoof,.7); ctx.fill();
    } else if(o.type==="tower"){
      const hgt = o.h*22;
      box(o.gx,o.gy, hgt, PALETTE.tower, shade(PALETTE.towerGlass,.5), shade(PALETTE.towerGlass,.72));
      // 窓のドット（lit）
      const base=iso(o.gx,o.gy); const z2=cam.zoom;
      ctx.fillStyle=PALETTE.towerLit;
      for(let fy=0; fy<6; fy++){
        for(let fx=0; fx<2; fx++){
          if(Math.random()<0.55){
            const wx = base.x - 14*z2 + fx*12*z2;
            const wy = base.y - hgt*z2 + 14*z2 + fy*14*z2;
            ctx.globalAlpha=.85; ctx.fillRect(wx,wy,5*z2,6*z2); ctx.globalAlpha=1;
          }
        }
      }
    } else if(o.type==="tree"){
      const base=iso(o.gx,o.gy); const z2=cam.zoom;
      const tx=base.x, ty=base.y+TILE_H/2*z2;
      // trunk
      ctx.fillStyle=PALETTE.trunk;
      ctx.fillRect(tx-3*z2, ty-22*z2, 6*z2, 22*z2);
      // foliage（ドット風 2段）
      ctx.fillStyle=PALETTE.treeDark;
      ctx.beginPath(); ctx.ellipse(tx, ty-26*z2, 16*z2, 13*z2, 0,0,6.28); ctx.fill();
      ctx.fillStyle=PALETTE.tree;
      ctx.beginPath(); ctx.ellipse(tx-3*z2, ty-32*z2, 12*z2, 10*z2, 0,0,6.28); ctx.fill();
    } else if(o.type==="flower"){
      const base=iso(o.gx,o.gy); const z2=cam.zoom;
      const col = PALETTE.flower[(o.gx*3+o.gy)%PALETTE.flower.length];
      const fx=base.x, fy=base.y+TILE_H/2*z2;
      ctx.strokeStyle=PALETTE.tree; ctx.lineWidth=2*z2;
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx,fy-12*z2); ctx.stroke();
      ctx.fillStyle=col;
      for(let i=0;i<5;i++){
        const a=i/5*6.28 + t*0.3;
        ctx.beginPath(); ctx.ellipse(fx+Math.cos(a)*5*z2, fy-12*z2+Math.sin(a)*5*z2, 3.4*z2,3.4*z2,0,0,6.28); ctx.fill();
      }
      ctx.fillStyle=PALETTE.towerLit;
      ctx.beginPath(); ctx.arc(fx,fy-12*z2,2.6*z2,0,6.28); ctx.fill();
    }
  }

  let t=0, raf;
  function frame(){
    t+=0.016;
    ctx.clearRect(0,0,W,H);
    // 背景グラデ（空気感）
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#10141f"); g.addColorStop(1,"#0a0c12");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // 地面タイル
    for(let s=0;s<2*GRID-1;s++){
      for(let gx=0; gx<GRID; gx++){
        const gy=s-gx; if(gy<0||gy>=GRID) continue;
        const even=(gx+gy)%2===0;
        diamond(gx,gy, even?PALETTE.ground1:PALETTE.ground2, PALETTE.gridLine);
      }
    }
    // オブジェクト（奥→手前）
    for(const o of ORDER) drawObject(o,t);

    // 光の粒（加算ブルーム）
    ctx.globalCompositeOperation="lighter";
    for(const p of particles){
      const px = p.x*W;
      const py = (p.y - (t*0.02*p.z)%1 +1)%1 * H;
      const tw = 0.5+0.5*Math.sin(t*1.6+p.ph);
      const r = p.s*(1+tw*0.6)*cam.zoom;
      const grd=ctx.createRadialGradient(px,py,0,px,py,r*5);
      grd.addColorStop(0,`rgba(182,255,63,${0.5*tw})`);
      grd.addColorStop(.4,`rgba(122,209,255,${0.2*tw})`);
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(px,py,r*5,0,6.28); ctx.fill();
    }
    ctx.globalCompositeOperation="source-over";

    // ビネット
    const vg=ctx.createRadialGradient(W/2,H*0.45,H*0.2,W/2,H*0.5,H*0.85);
    vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(1,"rgba(0,0,0,.45)");
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    raf=requestAnimationFrame(frame);
  }
  frame();

  // パン & ズーム
  let drag=false,lx=0,ly=0;
  canvas.addEventListener("pointerdown",e=>{drag=true;lx=e.clientX;ly=e.clientY;canvas.setPointerCapture(e.pointerId);});
  canvas.addEventListener("pointermove",e=>{ if(!drag)return; cam.tx+=(e.clientX-lx); cam.ty+=(e.clientY-ly); lx=e.clientX; ly=e.clientY; });
  canvas.addEventListener("pointerup",()=>drag=false);
  canvas.addEventListener("wheel",e=>{ e.preventDefault(); cam.zoom=Math.max(.5,Math.min(2.2,cam.zoom*(e.deltaY<0?1.08:0.93))); },{passive:false});
}

/* ============================================================
   02: 切り絵フラット 2.5D  (SVG + パララックス)
   ============================================================ */
function initFlat(){
  const host = document.getElementById("flatHost");
  const NS="http://www.w3.org/2000/svg";
  const VW=1600, VH=1000;
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${VW} ${VH}`);
  svg.setAttribute("preserveAspectRatio","xMidYMid slice");
  host.appendChild(svg);

  // defs: グラデ & グロー
  svg.innerHTML = `
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171b2c"/>
      <stop offset="0.55" stop-color="#0f1320"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <radialGradient id="glowMag" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2fa0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff2fa0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLime" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b6ff3f" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b6ff3f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222a3d"/>
      <stop offset="1" stop-color="#161c2a"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="${VW}" height="${VH}" fill="url(#sky)"/>
  <circle cx="1180" cy="240" r="420" fill="url(#glowMag)"/>
  <circle cx="380" cy="520" r="360" fill="url(#glowLime)"/>
  <g id="layerFar"></g>
  <g id="layerMid"></g>
  <g id="layerNear"></g>
  <g id="layerDust"></g>
  `;

  const far=svg.querySelector("#layerFar");
  const mid=svg.querySelector("#layerMid");
  const near=svg.querySelector("#layerNear");
  const dust=svg.querySelector("#layerDust");

  // アイソメ風に座標変換（フラットでも奥行きを錯覚させる）
  const CX=VW/2, CY=420, TW=150, TH=78;
  function P(gx,gy){ return { x: CX+(gx-gy)*TW/2, y: CY+(gx+gy)*TH/2 }; }

  function el(tag,attrs){ const e=document.createElementNS(NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

  // 地面（菱形パネルを敷く）
  for(const o of ORDER){} // noop
  const gground = el("g",{});
  for(let s=0;s<2*GRID-1;s++){
    for(let gx=0;gx<GRID;gx++){
      const gy=s-gx; if(gy<0||gy>=GRID) continue;
      const c=P(gx,gy);
      const pts=`${c.x},${c.y} ${c.x+TW/2},${c.y+TH/2} ${c.x},${c.y+TH} ${c.x-TW/2},${c.y+TH/2}`;
      const even=(gx+gy)%2===0;
      gground.appendChild(el("polygon",{points:pts, fill: even?"#212a3e":"#1a2132", stroke:"#303a52", "stroke-width":0}));
      gground.lastChild.setAttribute("stroke","#303a52");
      gground.lastChild.setAttribute("stroke-width","1.2");
    }
  }
  far.appendChild(gground);

  function shade(hex,f){const c=parseInt(hex.slice(1),16);let r=(c>>16)&255,g=(c>>8)&255,b=c&255;return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}

  function flatHouse(o){
    const c=P(o.gx,o.gy); const w=TW*0.62, h=86;
    const g=el("g",{});
    const bx=c.x-w/2, by=c.y-h+TH/2;
    // body
    g.appendChild(el("polygon",{points:`${bx},${by} ${bx+w},${by} ${bx+w},${by+h} ${bx},${by+h}`, fill:"#eef1f8"}));
    g.appendChild(el("polygon",{points:`${bx+w},${by} ${bx+w+18},${by-10} ${bx+w+18},${by+h-10} ${bx+w},${by+h}`, fill:shade("#eef1f8",.72)}));
    // roof
    g.appendChild(el("polygon",{points:`${bx-6},${by} ${bx+w/2},${by-40} ${bx+w+6},${by}`, fill:"#ff5fae"}));
    g.appendChild(el("polygon",{points:`${bx+w+6},${by} ${bx+w/2},${by-40} ${bx+w/2+22},${by-50} ${bx+w+24},${by-10}`, fill:shade("#ff5fae",.7)}));
    // door
    g.appendChild(el("rect",{x:c.x-12, y:by+h-34, width:24, height:34, fill:"#2a3142", rx:3}));
    return g;
  }
  function flatTower(o){
    const c=P(o.gx,o.gy); const w=TW*0.5, h=o.h*64;
    const g=el("g",{});
    const bx=c.x-w/2, by=c.y-h+TH/2;
    g.appendChild(el("polygon",{points:`${bx},${by} ${bx+w},${by} ${bx+w},${by+h} ${bx},${by+h}`, fill:"#d3dbef"}));
    g.appendChild(el("polygon",{points:`${bx+w},${by} ${bx+w+22},${by-12} ${bx+w+22},${by+h-12} ${bx+w},${by+h}`, fill:"#7f8db0"}));
    // 窓
    for(let r=0;r<8;r++) for(let cc=0;cc<3;cc++){
      const lit = Math.random()<0.5;
      g.appendChild(el("rect",{x:bx+10+cc*((w-20)/3), y:by+16+r*((h-26)/8), width:(w-20)/3-6, height:(h-26)/8-8,
        fill: lit?"#ffe87a":"#39516e", rx:1}));
      g.lastChild.setAttribute("fill", lit?"#ffe87a":"#39516e");
    }
    // antenna glow
    g.appendChild(el("rect",{x:c.x-2,y:by-26,width:4,height:26,fill:"#b6ff3f"}));
    g.appendChild(el("circle",{cx:c.x,cy:by-30,r:7,fill:"#b6ff3f",filter:"url(#soft)"}));
    return g;
  }
  function flatTree(o){
    const c=P(o.gx,o.gy); const g=el("g",{});
    const tx=c.x, ty=c.y+TH/2;
    g.appendChild(el("rect",{x:tx-5,y:ty-46,width:10,height:46,fill:"#8a5a3a",rx:2}));
    g.appendChild(el("circle",{cx:tx,cy:ty-58,r:34,fill:"#2f9e57"}));
    g.appendChild(el("circle",{cx:tx-10,cy:ty-70,r:26,fill:"#5fd17a"}));
    g.appendChild(el("circle",{cx:tx+14,cy:ty-64,r:20,fill:"#46b86a"}));
    return g;
  }
  function flatFlower(o){
    const c=P(o.gx,o.gy); const g=el("g",{});
    const col=PALETTE.flower[(o.gx*3+o.gy)%PALETTE.flower.length];
    const fx=c.x, fy=c.y+TH/2;
    g.appendChild(el("rect",{x:fx-2,y:fy-26,width:4,height:26,fill:"#46b86a"}));
    for(let i=0;i<5;i++){ const a=i/5*6.28; g.appendChild(el("circle",{cx:fx+Math.cos(a)*9,cy:fy-26+Math.sin(a)*9,r:7,fill:col})); }
    g.appendChild(el("circle",{cx:fx,cy:fy-26,r:5,fill:"#ffe87a"}));
    return g;
  }

  // 配置（奥→手前で near/mid に振り分け）
  for(const o of ORDER){
    let node;
    if(o.type==="house") node=flatHouse(o);
    else if(o.type==="tower") node=flatTower(o);
    else if(o.type==="tree") node=flatTree(o);
    else node=flatFlower(o);
    const layer = (o.gx+o.gy) < GRID-1 ? mid : near;
    layer.appendChild(node);
  }

  // 舞う光の粒
  const dustN=34, dots=[];
  for(let i=0;i<dustN;i++){
    const d=el("circle",{cx:Math.random()*VW, cy:Math.random()*VH, r:Math.random()*3+1.2, fill:i%2?"#b6ff3f":"#ff8fd2", opacity:0.5});
    dust.appendChild(d); dots.push({el:d, x:parseFloat(d.getAttribute("cx")), y:parseFloat(d.getAttribute("cy")), sp:Math.random()*0.4+0.15, ph:Math.random()*6.28});
  }

  // パララックス
  let mx=0,my=0;
  host.addEventListener("pointermove",e=>{
    const r=host.getBoundingClientRect();
    mx=((e.clientX-r.left)/r.width-0.5);
    my=((e.clientY-r.top)/r.height-0.5);
  });
  let t=0;
  (function loop(){
    t+=0.016;
    far.setAttribute("transform",`translate(${mx*-14},${my*-8})`);
    mid.setAttribute("transform",`translate(${mx*22},${my*12})`);
    near.setAttribute("transform",`translate(${mx*46},${my*24})`);
    for(const d of dots){
      d.y -= d.sp; if(d.y< -10) d.y=VH+10;
      const tw=0.4+0.6*Math.abs(Math.sin(t*1.4+d.ph));
      d.el.setAttribute("cy", d.y);
      d.el.setAttribute("cx", d.x + Math.sin(t*0.8+d.ph)*10 + mx*30);
      d.el.setAttribute("opacity", (0.25+tw*0.5).toFixed(2));
    }
    requestAnimationFrame(loop);
  })();
}

/* ============================================================
   03: 3D ボクセル  (Three.js)
   ============================================================ */
let threeAPI=null;
async function initThree(){
  let THREE;
  try { THREE = await import("three"); }
  catch(e){
    document.getElementById("threeCanvas").insertAdjacentHTML("afterend",
      `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#7c8298;font-size:13px;text-align:center;padding:20px">3Dライブラリの読み込みに失敗。ネット環境だと出るやつ。<br>2タブで質感は十分比較できるよ。</div>`);
    return;
  }
  const canvas=document.getElementById("threeCanvas");
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.05;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0c13);
  scene.fog=new THREE.Fog(0x0a0c13, 16, 38);
  const cam=new THREE.PerspectiveCamera(34,16/10,0.1,100); // 画角やや狭め=ミニチュア感

  // ---- 三点ライティング（暖色キー＋寒色フィル＋ネオンのリム）----
  // フィル: 空(寒色)と地(暖色)のヘミスフィアで陰影に色を仕込む
  scene.add(new THREE.HemisphereLight(0x6a7cff, 0x2a1d24, 0.55));
  scene.add(new THREE.AmbientLight(0x36406a, 0.35));
  // キー: 暖色のディレクショナル。これだけ影を持たせる(ジオラマの主役影)
  const key=new THREE.DirectionalLight(0xffe8c2, 3.0);
  key.position.set(7,13,5);
  key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=1; key.shadow.camera.far=46;
  key.shadow.camera.left=-9; key.shadow.camera.right=9;
  key.shadow.camera.top=9; key.shadow.camera.bottom=-9;
  key.shadow.bias=-0.0005; key.shadow.normalBias=0.04;
  key.shadow.radius=3;
  scene.add(key);

  // ---- 見える光源(月/太陽) ----
  const emissiveMeshes=[]; // bloom用に発光体を覚えておく(宣言を先頭に)
  // キーライトの位置に発光球を置いて「光がどこから来てるか」を可視化。
  // トグルで本体・光ともにオンオフ。オフ時はフィルだけになって陰影が分かりにくくなるので比較用。
  const ORB_POS=new THREE.Vector3(7,13,5); // = キーライト方向
  key.position.copy(ORB_POS);
  const orbGroup=new THREE.Group(); scene.add(orbGroup);
  const orbCore=new THREE.Mesh(new THREE.SphereGeometry(0.9,24,24),
    new THREE.MeshStandardMaterial({color:0x000000, emissive:0xfff2d6, emissiveIntensity:4.2}));
  orbCore.position.copy(ORB_POS); orbGroup.add(orbCore); emissiveMeshes.push(orbCore);
  // ハロ(やわらかい外周。常にカメラを向くビルボード)
  const haloMat=new THREE.SpriteMaterial({color:0xffecc0, transparent:true, opacity:0.62,
    blending:THREE.AdditiveBlending, depthWrite:false});
  const halo=new THREE.Sprite(haloMat); halo.scale.set(5.0,5.0,1); halo.position.copy(ORB_POS); orbGroup.add(halo);

  // リム: ネオン2色のポイントライト(色だけ足す。影は持たせない=軽量)
  const rimM=new THREE.PointLight(0xff2fa0, 26, 26, 2.0); rimM.position.set(9,4,-7); scene.add(rimM);
  const rimL=new THREE.PointLight(0xb6ff3f, 18, 26, 2.0); rimL.position.set(-9,3,7); scene.add(rimL);

  const root=new THREE.Group(); scene.add(root);
  const HALF=(GRID-1)/2;
  function gpos(gx,gy){ return [gx-HALF, gy-HALF]; }

  // ---- 地面(影を受ける台座) ----
  const baseGeo=new THREE.BoxGeometry(GRID+0.6,0.6,GRID+0.6);
  const baseMat=new THREE.MeshStandardMaterial({color:0x121a26, roughness:1, metalness:0});
  const baseMesh=new THREE.Mesh(baseGeo,baseMat);
  baseMesh.position.set(0,-0.5,0); baseMesh.receiveShadow=true; root.add(baseMesh);

  const tileGeo=new THREE.BoxGeometry(0.96,0.18,0.96);
  for(let gx=0;gx<GRID;gx++) for(let gy=0;gy<GRID;gy++){
    const even=(gx+gy)%2===0;
    const m=new THREE.MeshStandardMaterial({color:even?0x273349:0x1c2638, roughness:.92, metalness:0});
    const t=new THREE.Mesh(tileGeo,m);
    const [x,z]=gpos(gx,gy); t.position.set(x,-0.09,z);
    t.receiveShadow=true; t.castShadow=false; root.add(t);
  }

  function boxMesh(w,h,d,color,x,z,rough=0.7){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
      new THREE.MeshStandardMaterial({color,roughness:rough,metalness:0.02}));
    const [px,pz]=gpos(x,z); m.position.set(px,h/2,pz);
    m.castShadow=true; m.receiveShadow=true; root.add(m); return m;
  }

  // (emissiveMeshes は上部で宣言済み)

  for(const o of ORDER){
    const [x,z]=[o.gx,o.gy];
    if(o.type==="house"){
      boxMesh(0.66,0.6,0.66,0xe9edf7,x,z,.8);
      const roof=new THREE.Mesh(new THREE.ConeGeometry(0.56,0.44,4),
        new THREE.MeshStandardMaterial({color:0xff4fa6,roughness:.55}));
      const [px,pz]=gpos(x,z); roof.position.set(px,0.6+0.22,pz);
      roof.rotation.y=Math.PI/4; roof.castShadow=true; root.add(roof);
      // 窓(小さな発光)
      const win=new THREE.Mesh(new THREE.PlaneGeometry(0.16,0.18),
        new THREE.MeshStandardMaterial({color:0x0,emissive:0xffd96a,emissiveIntensity:1.4,side:THREE.DoubleSide}));
      win.position.set(px,0.3,pz+0.331); root.add(win); emissiveMeshes.push(win);
    } else if(o.type==="tower"){
      const h=o.h*0.62;
      boxMesh(0.6,h,0.6,0x9aaccd,x,z,.32);
      const [px,pz]=gpos(x,z);
      // 窓グリッド(発光プレーンを4面に)
      const winMat=new THREE.MeshStandardMaterial({color:0x0,emissive:0x8fe0ff,emissiveIntensity:1.1,side:THREE.DoubleSide});
      for(let fy=0; fy<6; fy++){
        for(let s=0;s<4;s++){
          if(Math.random()<0.5) continue;
          const win=new THREE.Mesh(new THREE.PlaneGeometry(0.1,0.12), winMat);
          const yy=0.25+fy*(h-0.4)/6;
          const off=0.301;
          if(s===0){ win.position.set(px-0.15+Math.random()*0.3, yy, pz+off); }
          else if(s===1){ win.position.set(px-0.15+Math.random()*0.3, yy, pz-off); win.rotation.y=Math.PI; }
          else if(s===2){ win.position.set(px+off, yy, pz-0.15+Math.random()*0.3); win.rotation.y=Math.PI/2; }
          else { win.position.set(px-off, yy, pz-0.15+Math.random()*0.3); win.rotation.y=-Math.PI/2; }
          root.add(win); emissiveMeshes.push(win);
        }
      }
      // 屋上アンテナ(ライム発光)
      const ant=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.5),
        new THREE.MeshStandardMaterial({color:0xb6ff3f,emissive:0xb6ff3f,emissiveIntensity:2}));
      ant.position.set(px,h+0.25,pz); root.add(ant); emissiveMeshes.push(ant);
      const beacon=new THREE.Mesh(new THREE.SphereGeometry(0.05,12,12),
        new THREE.MeshStandardMaterial({color:0xb6ff3f,emissive:0xb6ff3f,emissiveIntensity:3}));
      beacon.position.set(px,h+0.52,pz); root.add(beacon); emissiveMeshes.push(beacon);
    } else if(o.type==="tree"){
      const [px,pz]=gpos(x,z);
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.09,0.4),
        new THREE.MeshStandardMaterial({color:0x7a4f33,roughness:.95}));
      trunk.position.set(px,0.2,pz); trunk.castShadow=true; root.add(trunk);
      const foli=new THREE.Mesh(new THREE.IcosahedronGeometry(0.34,0),
        new THREE.MeshStandardMaterial({color:0x4fc06f,roughness:.85,flatShading:true}));
      foli.position.set(px,0.64,pz); foli.castShadow=true; foli.receiveShadow=true; root.add(foli);
      const foli2=new THREE.Mesh(new THREE.IcosahedronGeometry(0.22,0),
        new THREE.MeshStandardMaterial({color:0x6ad888,roughness:.85,flatShading:true}));
      foli2.position.set(px+0.1,0.82,pz-0.05); foli2.castShadow=true; root.add(foli2);
    } else {
      const [px,pz]=gpos(x,z);
      const colArr=[0xff7ad1,0xffd24a,0x7ad1ff,0xb6ff3f];
      const col=colArr[(o.gx*3+o.gy)%4];
      const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.24),
        new THREE.MeshStandardMaterial({color:0x46b86a,roughness:.9}));
      stem.position.set(px,0.12,pz); stem.castShadow=true; root.add(stem);
      const head=new THREE.Mesh(new THREE.IcosahedronGeometry(0.13,0),
        new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.5,flatShading:true}));
      head.position.set(px,0.3,pz); head.castShadow=true; root.add(head); emissiveMeshes.push(head);
    }
  }

  // ---- 漂う光の粒(2層構成) ----
  // 層1: 全粒子の見た目(加算Points)
  // 層2: 一部の粒を実PointLight化(実際に周囲を照らす蛍)。重さは許容してLIT_N=15。
  const pGeo=new THREE.BufferGeometry();
  const N=70, pos=new Float32Array(N*3), seed=new Float32Array(N);
  // 粒のリスポーン: 上端に達した粒を、新しいランダムxz座標で底から出し直す
  function respawn(i){
    pos[i*3]   = (Math.random()-0.5)*11;
    pos[i*3+1] = -0.3 - Math.random()*0.6;   // 少し下から
    pos[i*3+2] = (Math.random()-0.5)*11;
    seed[i]    = Math.random()*6.28;
  }
  for(let i=0;i<N;i++){ respawn(i); pos[i*3+1]=Math.random()*6.5; } // 初期はばらけさせる
  pGeo.setAttribute("position",new THREE.BufferAttribute(pos,3));
  const pMat=new THREE.PointsMaterial({color:0xd4ffae,size:0.1,transparent:true,opacity:0.85,
    blending:THREE.AdditiveBlending,depthWrite:false});
  const points=new THREE.Points(pGeo,pMat); scene.add(points);

  // 層2: 実PointLight(15個)。各ライトは特定の粒インデックスに紐付き、
  // その粒がリスポーンしたらライトも一緒に新座標へ移る。
  const LIT_N=15;
  const litLights=[];
  const litIdx=[]; // 各ライトが追従する粒のインデックス
  for(let i=0;i<LIT_N;i++){
    const pl=new THREE.PointLight(0xc8ff9a, 1.3, 2.6, 2.8); // 弱め＋減衰やや急＝近接でも飽和しにくい
    scene.add(pl); litLights.push(pl);
    litIdx.push(Math.floor(i*N/LIT_N)); // 粒全体に散らして紐付け
  }

  // ============================================================
  // ポストプロセス: addons無しで自前構築
  //   1) シーンを rtScene にレンダ
  //   2) 明所抽出 → 横ブラー → 縦ブラー で bloom テクスチャ生成 (rtBloomA/B)
  //   3) 合成パス: シーン + bloom、tilt-shift(縦位置でブラー量可変)、ビネット、色グレ
  // ============================================================
  const fsQuad=(()=>{
    const geo=new THREE.PlaneGeometry(2,2);
    const sceneQ=new THREE.Scene();
    const camQ=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const mesh=new THREE.Mesh(geo,null); sceneQ.add(mesh);
    return { render(mat){ mesh.material=mat; renderer.render(sceneQ,camQ); }, scene:sceneQ, cam:camQ, mesh };
  })();

  let W=2,H=2;
  const mkRT=(w,h)=> new THREE.WebGLRenderTarget(w,h,{type:THREE.HalfFloatType, minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter});
  let rtScene=mkRT(2,2), rtBrightA=mkRT(2,2), rtBrightB=mkRT(2,2);

  const VERT=`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }`;

  // 明所抽出
  const brightMat=new THREE.ShaderMaterial({uniforms:{tDiffuse:{value:null},threshold:{value:0.72}},vertexShader:VERT,
    fragmentShader:`uniform sampler2D tDiffuse; uniform float threshold; varying vec2 vUv;
    void main(){ vec4 c=texture2D(tDiffuse,vUv); float l=dot(c.rgb,vec3(0.299,0.587,0.114));
      float k=smoothstep(threshold,threshold+0.25,l); gl_FragColor=vec4(c.rgb*k,1.0); }`});
  // 分離ガウシアン
  const blurMat=new THREE.ShaderMaterial({uniforms:{tDiffuse:{value:null},dir:{value:new THREE.Vector2(1,0)},res:{value:new THREE.Vector2(2,2)}},vertexShader:VERT,
    fragmentShader:`uniform sampler2D tDiffuse; uniform vec2 dir; uniform vec2 res; varying vec2 vUv;
    void main(){ vec2 px=dir/res; vec4 s=vec4(0.0);
      s+=texture2D(tDiffuse,vUv)*0.2270270270;
      s+=texture2D(tDiffuse,vUv+px*1.3846153846)*0.3162162162;
      s+=texture2D(tDiffuse,vUv-px*1.3846153846)*0.3162162162;
      s+=texture2D(tDiffuse,vUv+px*3.2307692308)*0.0702702703;
      s+=texture2D(tDiffuse,vUv-px*3.2307692308)*0.0702702703;
      gl_FragColor=s; }`});
  // 合成(tilt-shift + bloom + ビネット + 色グレ)
  const compMat=new THREE.ShaderMaterial({uniforms:{
      tDiffuse:{value:null}, tBloom:{value:null}, res:{value:new THREE.Vector2(2,2)},
      bloomStrength:{value:0.9}, focus:{value:0.5}, tiltRange:{value:0.34}, tiltStrength:{value:1.0},
      vignette:{value:0.5}, enableTilt:{value:1.0}, enableBloom:{value:1.0}, enableGrade:{value:1.0}, time:{value:0}
    },vertexShader:VERT,
    fragmentShader:`
    uniform sampler2D tDiffuse; uniform sampler2D tBloom; uniform vec2 res;
    uniform float bloomStrength, focus, tiltRange, tiltStrength, vignette;
    uniform float enableTilt, enableBloom, enableGrade, time; varying vec2 vUv;
    // tilt-shift: 画面の縦位置=擬似深度。focus帯から離れるほどブラー
    vec3 tiltBlur(vec2 uv, float amt){
      if(amt<0.003) return texture2D(tDiffuse,uv).rgb;
      vec2 px=amt/res*vec2(res.y/res.x,1.0)*9.0;
      vec3 s=vec3(0.0); float wsum=0.0;
      for(int i=-4;i<=4;i++){ for(int j=-4;j<=4;j++){
        vec2 o=vec2(float(i),float(j))*px;
        float w=1.0-length(vec2(float(i),float(j)))/6.5; if(w<0.0) continue;
        s+=texture2D(tDiffuse,uv+o).rgb*w; wsum+=w;
      }}
      return s/wsum;
    }
    void main(){
      float d=abs(vUv.y-focus);
      float amt = enableTilt>0.5 ? clamp((d-tiltRange)/0.32,0.0,1.0)*tiltStrength : 0.0;
      vec3 col = amt>0.003 ? tiltBlur(vUv,amt) : texture2D(tDiffuse,vUv).rgb;
      // bloom加算
      if(enableBloom>0.5){ vec3 b=texture2D(tBloom,vUv).rgb; col += b*bloomStrength; }
      // 色グレーディング: シャドウを青紫、ハイライトを暖色に寄せる(split-tone)
      if(enableGrade>0.5){
        float l=dot(col,vec3(0.299,0.587,0.114));
        vec3 shadowT=vec3(0.42,0.46,0.62); vec3 highT=vec3(1.06,1.0,0.92);
        col*=mix(shadowT,highT,smoothstep(0.1,0.7,l));
        col=pow(col,vec3(0.94)); // 軽いコントラスト
      }
      // ビネット
      vec2 q=vUv-0.5; float vig=1.0-dot(q,q)*vignette*2.2;
      col*=clamp(vig,0.0,1.0);
      // 微量グレイン(バンディング対策)
      float g=fract(sin(dot(vUv*res+time,vec2(12.9898,78.233)))*43758.5453);
      col+=(g-0.5)*0.012;
      gl_FragColor=vec4(col,1.0);
    }`});

  function resize(){
    const r=canvas.getBoundingClientRect();
    W=Math.max(2,Math.floor(r.width)); H=Math.max(2,Math.floor(r.height));
    const dpr=Math.min(devicePixelRatio,2);
    renderer.setSize(W,H,false);
    cam.aspect=W/H; cam.updateProjectionMatrix();
    const pw=Math.floor(W*dpr), ph=Math.floor(H*dpr);
    rtScene.setSize(pw,ph);
    const bw=Math.floor(pw/2), bh=Math.floor(ph/2); // bloomは半解像度で軽量化
    rtBrightA.setSize(bw,bh); rtBrightB.setSize(bw,bh);
    blurMat.uniforms.res.value.set(bw,bh);
    compMat.uniforms.res.value.set(pw,ph);
  }
  new ResizeObserver(resize).observe(canvas); resize();

  // ---- 効果トグルUI ----
  const fx={ moon:true, tilt:true, bloom:true, grade:true };
  const togHost=document.getElementById("threeToggles");
  const defs=[["moon","月/太陽"],["tilt","tilt-shift"],["bloom","bloom"],["grade","色グレ"]];
  togHost.innerHTML="";
  for(const [k,label] of defs){
    const b=document.createElement("button");
    b.className="fx-toggle"; b.dataset.on="true";
    b.innerHTML=`<span class="sw"></span>${label}`;
    b.addEventListener("click",()=>{
      fx[k]=!fx[k]; b.dataset.on=String(fx[k]);
      if(k==="moon"){ orbGroup.visible=fx.moon; key.visible=fx.moon; }
    });
    togHost.appendChild(b);
  }

  // ---- カメラ操作 ----
  let yaw=0.72, pitch=0.66, dist=15, dragging=false, lx=0,ly=0;
  function updateCam(){
    cam.position.set(Math.sin(yaw)*Math.cos(pitch)*dist, Math.sin(pitch)*dist, Math.cos(yaw)*Math.cos(pitch)*dist);
    cam.lookAt(0,1.0,0);
  }
  updateCam();
  canvas.addEventListener("pointerdown",e=>{dragging=true;lx=e.clientX;ly=e.clientY;canvas.setPointerCapture(e.pointerId);});
  canvas.addEventListener("pointermove",e=>{ if(!dragging)return; yaw-=(e.clientX-lx)*0.008; pitch=Math.max(0.16,Math.min(1.45,pitch+(e.clientY-ly)*0.006)); lx=e.clientX;ly=e.clientY; updateCam(); });
  canvas.addEventListener("pointerup",()=>dragging=false);
  canvas.addEventListener("wheel",e=>{e.preventDefault();dist=Math.max(8,Math.min(24,dist*(e.deltaY<0?0.93:1.08)));updateCam();},{passive:false});

  let running=true, t=0, loopOn=false;
  threeAPI={ pause(){running=false;}, resume(){running=true; if(!loopOn) loop();} };

  function loop(){
    loopOn=true;
    if(!running){ loopOn=false; return; }
    t+=0.016;
    // 粒子のゆらぎ(ゆっくり上昇＋横漂い)
    const arr=pGeo.attributes.position.array;
    for(let i=0;i<N;i++){
      arr[i*3+1]+=0.0022;                                   // 上昇を遅く
      arr[i*3]  +=Math.sin(t*0.5+seed[i])*0.0016;           // 横漂い
      arr[i*3+2]+=Math.cos(t*0.4+seed[i]*1.3)*0.0012;
      if(arr[i*3+1]>6.7) respawn(i);                        // 上端で別座標から再登場
    }
    pGeo.attributes.position.needsUpdate=true;
    pMat.opacity=0.55+0.25*Math.sin(t*1.4);
    // 層2: 実ライト(15個)を紐付け粒に追従＆明滅
    for(let i=0;i<LIT_N;i++){
      const idx=litIdx[i];
      litLights[i].position.set(arr[idx*3],arr[idx*3+1],arr[idx*3+2]);
      litLights[i].intensity=0.9+0.7*Math.sin(t*1.6+seed[idx]*2.0);
    }
    rimM.intensity=24+6*Math.sin(t*1.3);
    rimL.intensity=16+5*Math.sin(t*1.7+2.0);

    // 1) シーン
    renderer.setRenderTarget(rtScene);
    renderer.clear(); renderer.render(scene,cam);

    // 2) bloom: 明所抽出 → H blur → V blur
    renderer.setRenderTarget(rtBrightA);
    brightMat.uniforms.tDiffuse.value=rtScene.texture; fsQuad.render(brightMat);
    blurMat.uniforms.dir.value.set(1,0); blurMat.uniforms.tDiffuse.value=rtBrightA.texture;
    renderer.setRenderTarget(rtBrightB); fsQuad.render(blurMat);
    blurMat.uniforms.dir.value.set(0,1); blurMat.uniforms.tDiffuse.value=rtBrightB.texture;
    renderer.setRenderTarget(rtBrightA); fsQuad.render(blurMat);

    // 3) 合成 → 画面
    compMat.uniforms.tDiffuse.value=rtScene.texture;
    compMat.uniforms.tBloom.value=rtBrightA.texture;
    compMat.uniforms.enableTilt.value=fx.tilt?1:0;
    compMat.uniforms.enableBloom.value=fx.bloom?1:0;
    compMat.uniforms.enableGrade.value=fx.grade?1:0;
    compMat.uniforms.time.value=t;
    renderer.setRenderTarget(null);
    fsQuad.render(compMat);

    requestAnimationFrame(loop);
  }
  loop();
}
/* ============================================================ */
const INIT = { iso:initIso, flat:initFlat, three:initThree };
selectStage("iso"); // 初期化
document.getElementById("legend").textContent =
  "※ これは見た目の質感だけを比べる試作。プロセス監視・TODO・報酬ロジックは未接続。被写体（家・木・花・ビル・光の粒）は3方式で同一配置。";
