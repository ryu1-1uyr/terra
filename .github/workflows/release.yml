name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup target add ${{ matrix.target }}

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version: $VERSION"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sed -i "s/\"version\": \"0.0.0-dev\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            sed -i "s/^version = \"0.0.0-dev\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          else
            sed -i '' "s/\"version\": \"0.0.0-dev\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            sed -i '' "s/^version = \"0.0.0-dev\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "terra ${{ github.ref_name }}"
          releaseBody: |
            See the [commits since last release](https://github.com/${{ github.repository }}/compare/.../${{ github.ref_name }}) for changes.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
